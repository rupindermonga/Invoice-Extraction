<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Owner Portal — Finel AI Projects</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<style>[x-cloak]{display:none!important}</style>
<script src="/static/js/tailwind.min.js"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{accent:'#00B8F0'}}}}}</script>
<script defer src="/static/js/alpine.min.js"></script>
<link rel="stylesheet" href="/static/css/fontawesome/all.min.css"/>
</head>
<body class="bg-slate-900 min-h-screen font-sans text-white"
      x-data="ownerPortal()" x-init="load()">

<!-- Header -->
<div class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <img src="/static/favicon.svg" alt="Finel AI" class="w-9 h-9 rounded-lg"/>
    <div>
      <div class="font-bold text-lg text-white">Finel AI Projects</div>
      <div class="text-xs text-slate-400" x-text="data?.label || 'Owner Portal'"></div>
    </div>
  </div>
  <div class="text-xs text-slate-500" x-text="data ? 'Generated ' + data.generated : ''"></div>
</div>

<!-- Error -->
<div x-show="error" x-cloak class="max-w-xl mx-auto mt-20 text-center">
  <i class="fa-solid fa-triangle-exclamation text-4xl text-amber-400 mb-4"></i>
  <h2 class="text-xl font-bold mb-2">Portal Unavailable</h2>
  <p class="text-slate-400 text-sm" x-text="error"></p>
</div>

<!-- Loading -->
<div x-show="loading && !error" class="text-center mt-20 text-slate-400">
  <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
  <div>Loading project data...</div>
</div>

<!-- Content -->
<template x-if="data && !loading">
<div class="max-w-5xl mx-auto px-4 py-8">

  <!-- Project header -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-white" x-text="data.project_name"></h1>
    <div class="flex flex-wrap gap-3 mt-2 text-sm text-slate-400">
      <span x-show="data.project_code"><i class="fa-solid fa-hashtag mr-1"></i><span x-text="data.project_code"></span></span>
      <span x-show="data.address"><i class="fa-solid fa-location-dot mr-1"></i><span x-text="data.address"></span></span>
    </div>
  </div>

  <!-- Budget overview cards -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <div class="bg-slate-800 rounded-xl p-4 text-center border border-slate-700">
      <div class="text-xs text-slate-400 uppercase font-bold mb-1">Contract Value</div>
      <div class="text-2xl font-bold text-white" x-text="'$'+fmt(data.budget.total)"></div>
      <div class="text-xs text-slate-500 mt-1">Total Budget</div>
    </div>
    <div class="bg-slate-800 rounded-xl p-4 text-center border border-slate-700">
      <div class="text-xs text-slate-400 uppercase font-bold mb-1">Invoiced to Date</div>
      <div class="text-2xl font-bold text-blue-400" x-text="'$'+fmt(data.totals.invoiced)"></div>
      <div class="text-xs text-slate-500 mt-1" x-text="data.totals.spend_pct+'% of budget'"></div>
    </div>
    <div class="bg-slate-800 rounded-xl p-4 text-center border border-slate-700">
      <div class="text-xs text-slate-400 uppercase font-bold mb-1">Lender Approved</div>
      <div class="text-2xl font-bold text-green-400" x-text="'$'+fmt(data.totals.approved)"></div>
      <div class="text-xs text-slate-500 mt-1">Total approved draws</div>
    </div>
    <div class="bg-slate-800 rounded-xl p-4 text-center border border-slate-700">
      <div class="text-xs text-slate-400 uppercase font-bold mb-1">Net Released</div>
      <div class="text-2xl font-bold text-cyan-400" x-text="'$'+fmt(data.totals.net_released)"></div>
      <div class="text-xs text-slate-500 mt-1">After holdback</div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="bg-slate-800 rounded-xl p-5 mb-6 border border-slate-700">
    <div class="flex justify-between text-sm mb-2">
      <span class="text-slate-300 font-semibold">Project Spend Progress</span>
      <span class="text-slate-400" x-text="data.totals.spend_pct+'% complete'"></span>
    </div>
    <div class="bg-slate-700 rounded-full h-4">
      <div class="h-4 rounded-full bg-gradient-to-r from-blue-600 to-cyan-400 transition-all"
           :style="'width:'+Math.min(100,data.totals.spend_pct)+'%'"></div>
    </div>
    <div class="flex justify-between text-xs text-slate-500 mt-1.5">
      <span>$0</span>
      <span x-text="'$'+fmt(data.budget.total)"></span>
    </div>
  </div>

  <!-- Draw summary table -->
  <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden mb-6">
    <div class="px-5 py-3 border-b border-slate-700 flex items-center justify-between">
      <h2 class="font-bold text-white">Draw History</h2>
      <span class="text-xs text-slate-400" x-text="data.draws.length+' draws'"></span>
    </div>
    <table class="w-full text-sm">
      <thead class="bg-slate-900">
        <tr>
          <th class="text-left px-4 py-2.5 text-xs font-semibold text-slate-400">Draw</th>
          <th class="text-left px-4 py-2.5 text-xs font-semibold text-slate-400">Submitted</th>
          <th class="text-right px-4 py-2.5 text-xs font-semibold text-slate-400">Submitted</th>
          <th class="text-right px-4 py-2.5 text-xs font-semibold text-slate-400">Approved</th>
          <th class="text-right px-4 py-2.5 text-xs font-semibold text-slate-400">Holdback</th>
          <th class="text-right px-4 py-2.5 text-xs font-semibold text-slate-400">Net Claim</th>
          <th class="text-center px-4 py-2.5 text-xs font-semibold text-slate-400">Status</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-700">
        <template x-for="d in data.draws" :key="d.draw_number">
          <tr class="hover:bg-slate-750">
            <td class="px-4 py-3 font-bold text-white" x-text="'Draw #'+d.draw_number"></td>
            <td class="px-4 py-3 text-xs text-slate-400" x-text="d.submission_date||'—'"></td>
            <td class="px-4 py-3 text-right text-xs text-slate-300" x-text="'$'+fmt(d.submitted)"></td>
            <td class="px-4 py-3 text-right text-xs text-green-400 font-medium" x-text="'$'+fmt(d.approved)"></td>
            <td class="px-4 py-3 text-right text-xs text-amber-400" x-text="'($'+fmt(d.holdback)+')'"></td>
            <td class="px-4 py-3 text-right text-xs font-bold text-cyan-400" x-text="'$'+fmt(d.net_claim)"></td>
            <td class="px-4 py-3 text-center">
              <span class="text-xs px-2 py-0.5 rounded-full font-semibold"
                    :class="d.status==='approved'?'bg-green-900 text-green-300':d.status==='submitted'?'bg-amber-900 text-amber-300':'bg-slate-700 text-slate-300'"
                    x-text="(d.status||'pending').toUpperCase()"></span>
              <span x-show="d.open_conditions > 0" class="ml-1 text-xs text-red-400">
                <i class="fa-solid fa-circle-xmark"></i> <span x-text="d.open_conditions+' conditions open'"></span>
              </span>
            </td>
          </tr>
        </template>
        <tr x-show="data.draws.length===0">
          <td colspan="7" class="px-4 py-6 text-center text-slate-500">No draws submitted yet</td>
        </tr>
      </tbody>
      <tfoot class="bg-slate-900 border-t border-slate-700">
        <tr>
          <td colspan="2" class="px-4 py-3 font-bold text-white text-xs">TOTAL</td>
          <td class="px-4 py-3 text-right text-xs font-bold text-slate-300" x-text="'$'+fmt(data.totals.submitted)"></td>
          <td class="px-4 py-3 text-right text-xs font-bold text-green-400" x-text="'$'+fmt(data.totals.approved)"></td>
          <td class="px-4 py-3 text-right text-xs font-bold text-amber-400" x-text="'($'+fmt(data.totals.holdback)+')'"></td>
          <td class="px-4 py-3 text-right text-xs font-bold text-cyan-400" x-text="'$'+fmt(data.totals.net_released)"></td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <!-- Category breakdown -->
  <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden mb-6">
    <div class="px-5 py-3 border-b border-slate-700">
      <h2 class="font-bold text-white">Budget by Category</h2>
    </div>
    <div class="divide-y divide-slate-700">
      <template x-for="cat in data.categories" :key="cat.name">
        <div class="px-5 py-3">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-sm font-medium text-white" x-text="cat.name"></span>
            <div class="text-xs text-slate-400">
              <span x-text="'$'+fmt(cat.spent)"></span>
              <span class="text-slate-600 mx-1">/</span>
              <span x-text="'$'+fmt(cat.budget)"></span>
              <span class="ml-2 font-bold" :class="cat.pct > 100 ? 'text-red-400' : 'text-slate-300'" x-text="cat.pct+'%'"></span>
            </div>
          </div>
          <div class="bg-slate-700 rounded-full h-1.5">
            <div class="h-1.5 rounded-full transition-all"
                 :class="cat.pct > 100 ? 'bg-red-500' : 'bg-blue-500'"
                 :style="'width:'+Math.min(100, cat.pct)+'%'"></div>
          </div>
        </div>
      </template>
      <div x-show="data.categories.length===0" class="px-5 py-6 text-center text-slate-500 text-sm">No cost categories defined</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="text-center text-xs text-slate-600 mt-8">
    <div>Powered by <a href="https://projects.finel.ai" class="text-cyan-500 hover:underline">Finel AI Projects</a></div>
    <div class="mt-1">This portal is read-only. Contact your project team for questions.</div>
  </div>
</div>
</template>

<script>
function ownerPortal() {
  return {
    loading: true, error: null, data: null,
    fmt(n) { return (n||0).toLocaleString('en-CA', {minimumFractionDigits:0, maximumFractionDigits:0}); },
    async load() {
      const token = window.location.pathname.split('/').filter(Boolean).pop();
      try {
        const r = await fetch('/owner/' + token);
        if (!r.ok) { const e = await r.json(); this.error = e.detail || 'Portal unavailable.'; }
        else { this.data = await r.json(); }
      } catch(e) { this.error = 'Failed to load portal data. Please try again.'; }
      finally { this.loading = false; }
    },
  };
}
</script>
</body>
</html>
