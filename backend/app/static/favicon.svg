<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <clipPath id="roundClip">
      <rect width="120" height="120" rx="24" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#FFFFFF" />

  <g clip-path="url(#roundClip)">
    <!-- Vertical bars (abstract F mark) — dark slate navy -->
    <!-- Bar 1 (leftmost, shortest) -->
    <polygon points="16,48 28,48 28,88 16,80" fill="#1e293b" />
    
    <!-- Bar 2 (middle, tallest) -->
    <polygon points="34,32 46,32 46,100 34,92" fill="#1e293b" />

    <!-- Bar 3 (top of the F crossbar, vertical part) -->
    <rect x="52" y="18" width="14" height="34" rx="1" fill="#1e293b" />

    <!-- F crossbar + descender -->
    <polygon points="52,58 96,58 96,72 68,72 68,104 52,96" fill="#1e293b" />

    <!-- Gear/chip icon (cyan) -->
    <!-- Outer square -->
    <rect x="76" y="28" width="22" height="22" rx="3" fill="#00B8F0" />
    <!-- Inner cutout -->
    <rect x="82" y="34" width="10" height="10" rx="1.5" fill="#FFFFFF" />
    
    <!-- Gear teeth - top -->
    <rect x="82" y="24" width="3" height="5" rx="0.5" fill="#00B8F0" />
    <rect x="88" y="24" width="3" height="5" rx="0.5" fill="#00B8F0" />
    
    <!-- Gear teeth - bottom -->
    <rect x="82" y="49" width="3" height="5" rx="0.5" fill="#00B8F0" />
    <rect x="88" y="49" width="3" height="5" rx="0.5" fill="#00B8F0" />
    
    <!-- Gear teeth - left -->
    <rect x="72" y="34" width="5" height="3" rx="0.5" fill="#00B8F0" />
    <rect x="72" y="40" width="5" height="3" rx="0.5" fill="#00B8F0" />
    
    <!-- Gear teeth - right -->
    <rect x="97" y="34" width="5" height="3" rx="0.5" fill="#00B8F0" />
    <rect x="97" y="40" width="5" height="3" rx="0.5" fill="#00B8F0" />
  </g>
</svg>
